<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการประชาสัมพันธ์ | Kabintify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold text-blue-600">📢 ประวัติการประกาศ</h1>
            <a href="index.html" class="text-sm text-gray-500 hover:underline">กลับหน้าหลัก</a>
        </div>

        <div id="history-list" class="space-y-4">
            <p class="text-center text-gray-400">กำลังโหลดข้อมูลจาก Google Sheets...</p>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                // ดึงข้อมูลจาก Hugging Face Space ของคุณ
                const response = await fetch('https://windysurface-kabintify.hf.space/get-history');
                const data = await response.json();
                const container = document.getElementById('history-list');
                
                // ตรวจสอบว่ามี Error จากฝั่ง Backend หรือไม่
                if (data.error) {
                    container.innerHTML = `<p class="text-center text-red-400">เกิดข้อผิดพลาด: ${data.error}</p>`;
                    return;
                }

                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-400">ยังไม่มีประวัติการประกาศในระบบ</p>';
                    return;
                }

                // ✅ แก้ไขจุดสำคัญ: เปลี่ยนชื่อตัวแปรให้ตรงกับหัวตารางใน Google Sheet (Timestamp, Message)
                container.innerHTML = data.map(item => `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 transition hover:shadow-md">
                        <div class="text-xs text-blue-500 mb-2 font-medium">
                            <i class="far fa-clock mr-1"></i> ${item.Timestamp || 'ไม่ระบุเวลา'}
                        </div>
                        <div class="text-gray-700 leading-relaxed">
                            ${(item.Message || '').replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `).join('');
                
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('history-list').innerHTML = 
                    '<div class="text-center py-10">' +
                    '<p class="text-red-400 mb-2">โหลดข้อมูลไม่สำเร็จ</p>' +
                    '<p class="text-gray-400 text-xs">กรุณาตรวจสอบว่าเซิร์ฟเวอร์บน Hugging Face เปิดอยู่</p>' +
                    '</div>';
            }
        }

        // เริ่มโหลดข้อมูลทันทีที่เปิดหน้าเว็บ
        loadHistory();
    </script>
</body>
</html>
