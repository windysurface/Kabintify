<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการประกาศ | Kabintify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold text-blue-600">📢 ประวัติการประกาศ</h1>
            <a href="index.html" class="text-gray-500 hover:underline">กลับหน้าหลัก</a>
        </div>

        <div id="history-list" class="space-y-4">
            <p class="text-center text-gray-400">กำลังดึงข้อมูล...</p>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                // ดึงข้อมูลจาก Hugging Face
                const response = await fetch('https://windysurface-kabintify.hf.space/get-history');
                const data = await response.json();
                const container = document.getElementById('history-list');
                
                if (data.error) {
                    container.innerHTML = `<p class="text-center text-red-400">Error: ${data.error}</p>`;
                    return;
                }

                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-400">ยังไม่มีประวัติในขณะนี้</p>';
                    return;
                }

                // ✅ แก้ไข: ใช้ Timestamp และ Message (ตัวพิมพ์ใหญ่ตามหัวตารางใน Sheet)
                container.innerHTML = data.map(item => `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-xs text-blue-500 mb-2 font-bold">${item.Timestamp}</div>
                        <div class="text-gray-700 leading-relaxed">${(item.Message || '').replace(/\n/g, '<br>')}</div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('history-list').innerHTML = '<p class="text-center text-red-400">โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง</p>';
            }
        }
        loadHistory();
    </script>
</body>
</html>
